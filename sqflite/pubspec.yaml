name: sqflite_spatial
repository: https://github.com/tekartik/sqflite/tree/master/sqflite
issue_tracker: https://github.com/tekartik/sqflite/issues
description: Android Flutter plugin for SQLite with SpatiaLite spatial query
  support (geospatial storage, indexing and querying), forked from sqflite.
version: 1.0.0

# Android only: this fork adds SpatiaLite spatial support and is not
# published for iOS/macOS/other platforms.
platforms:
  android:

topics:
  - sql
  - database
  - gis

funding:
  - https://github.com/sponsors/alextekartik

environment:
  sdk: ^3.12.0
  # Flutter versions prior to 3.7 did not support the
  # sharedDarwinSource option.
  flutter: ">=3.44.0"

flutter:
  plugin:
    platforms:
      android:
        default_package: sqflite_spatial_android

dependencies:
  flutter:
    sdk: flutter
  sqflite_spatial_android: ">=1.0.0 <2.0.0"
  sqflite_platform_interface: ">=2.4.1 <4.0.0"
  sqflite_common: ">=2.5.9 <4.0.0"
  path: ">=1.8.0 <3.0.0"

dev_dependencies:
  flutter_lints: ">=5.0.0"
  process_run: ">=0.12.0"
  http: ">=0.13.0"
  flutter_test:
    sdk: flutter
  test_api: ">=0.2.19"
  pub_semver: ">=2.0.0"

# sqflite_spatial_android is not yet published; resolved locally for
# development/testing in this repo. Ignored by downstream consumers (pub only
# applies overrides declared in the root package being resolved).
dependency_overrides:
  sqflite_spatial_android:
    path: ../sqflite_android
