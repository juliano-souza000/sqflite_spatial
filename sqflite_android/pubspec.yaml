name: sqflite_spatial_android
repository: https://github.com/tekartik/sqflite/tree/master/sqflite_android
issue_tracker: https://github.com/tekartik/sqflite/issues
description: Android implementation of sqflite_spatial, using a SpatiaLite-enabled
  native SQLite engine (org.spatialite.database) instead of the Android framework's
  built-in SQLite. Forked from sqflite_android.
version: 1.0.0

# This package supports all platforms listed below.
platforms:
  android:

topics:
  - sql
  - database

funding:
  - https://github.com/sponsors/alextekartik

environment:
  sdk: ^3.12.0
  # requires AGP 9.0
  flutter: ">=3.44.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.tekartik.sqflite
        pluginClass: SqflitePlugin
        dartPluginClass: SqfliteAndroid

dependencies:
  flutter:
    sdk: flutter
  sqflite_common: ">=2.5.9 <4.0.0"
  path: ">=1.8.0 <3.0.0"
  sqflite_platform_interface: ">=2.4.1 <4.0.0"

dev_dependencies:
  flutter_lints: ">=5.0.0"
  process_run: ">=0.12.0"
  http: ">=0.13.0"
  flutter_test:
    sdk: flutter
  test_api: ">=0.2.19"
  pub_semver: ">=2.0.0"
